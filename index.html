<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>D R I F T · a wordless adventure</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<link rel="icon" href="data:,">
<style>
  :root{--app-height:100dvh;--safe-top:env(safe-area-inset-top,0px);--safe-right:env(safe-area-inset-right,0px);--safe-bottom:env(safe-area-inset-bottom,0px);--safe-left:env(safe-area-inset-left,0px)}
  html,body{margin:0;padding:0;width:100%;height:100%;background:radial-gradient(ellipse at 50% 120%,#10101f 0%,#05050c 70%);overflow:hidden;font-family:sans-serif;overscroll-behavior:none;touch-action:none}
  body{min-height:var(--app-height);display:flex;align-items:center;justify-content:center;padding:calc(10px + var(--safe-top)) calc(10px + var(--safe-right)) calc(10px + var(--safe-bottom)) calc(10px + var(--safe-left));box-sizing:border-box}
  #stage{position:relative;width:min(calc(100vw - var(--safe-left) - var(--safe-right) - 20px),calc((var(--app-height) - var(--safe-top) - var(--safe-bottom) - 20px)*1.6),960px);aspect-ratio:16/10;touch-action:none}
  canvas#c{display:block;width:100%;height:100%;border-radius:12px;box-shadow:0 40px 100px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.06);cursor:none;touch-action:none;user-select:none;-webkit-user-select:none}
  #inv{position:absolute;left:50%;transform:translateX(-50%);bottom:16px;display:flex;gap:12px}
  .slot{width:54px;height:54px;border-radius:48% 52% 55% 45%/52% 46% 54% 48%;background:rgba(10,14,22,.55);border:1px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s,border-color .3s;backdrop-filter:blur(5px);touch-action:none}
  .slot:hover{transform:translateY(-5px) rotate(-3deg)}
  .slot.sel{border-color:#a9f0c8;box-shadow:0 0 22px rgba(140,230,180,.45),inset 0 0 12px rgba(140,230,180,.25)}
  .slot.empty{opacity:.22;pointer-events:none}
  .slot canvas{width:42px;height:42px}
  .stage-btn{position:absolute;top:14px;width:36px;height:36px;border-radius:50%;background:rgba(10,14,22,.5);border:1px solid rgba(255,255,255,.14);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .3s,box-shadow .3s,border-color .3s;touch-action:none;padding:0}
  .stage-btn:hover{border-color:rgba(190,245,215,.42);box-shadow:0 0 18px rgba(140,230,180,.22)}
  .stage-btn svg{opacity:.7}
  #mute{right:16px}
  #fullscreen{right:60px}
  #mute.off svg .wav{opacity:0}
  #fullscreen.on svg .in{display:none}
  #fullscreen:not(.on) svg .out{display:none}
  #rotateHint{position:absolute;left:50%;top:14px;transform:translateX(-50%);padding:7px 11px;border-radius:999px;background:rgba(10,14,22,.48);border:1px solid rgba(255,255,255,.12);color:rgba(220,245,235,.72);font:500 12px system-ui,sans-serif;letter-spacing:0;pointer-events:none;opacity:0;transition:opacity .25s;backdrop-filter:blur(5px);white-space:nowrap}
  body.pseudo-fullscreen{padding:var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left)}
  body.pseudo-fullscreen #stage{width:min(calc(100vw - var(--safe-left) - var(--safe-right)),calc((var(--app-height) - var(--safe-top) - var(--safe-bottom))*1.6));max-width:none}
  #stage:fullscreen{width:100vw;height:100vh;max-width:none;aspect-ratio:auto;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 120%,#10101f 0%,#05050c 70%);padding:var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);box-sizing:border-box}
  #stage:fullscreen canvas#c{width:min(calc(100vw - var(--safe-left) - var(--safe-right)),calc((100vh - var(--safe-top) - var(--safe-bottom))*1.6));height:auto;aspect-ratio:16/10}
  @media (orientation:portrait) and (max-width:700px){
    #rotateHint{opacity:1}
    #inv{bottom:10px;gap:8px}
    .slot{width:46px;height:46px}
    .slot canvas{width:36px;height:36px}
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="c" width="960" height="600"></canvas>
  <div id="inv"></div>
  <button id="fullscreen" class="stage-btn" title="Toggle fullscreen" aria-label="Toggle fullscreen"><svg width="17" height="17" viewBox="0 0 17 17"><path class="in" d="M2.5 6V2.5H6M11 2.5h3.5V6M14.5 11v3.5H11M6 14.5H2.5V11" stroke="#cfe3d8" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path class="out" d="M6 2.5V6H2.5M14.5 6H11V2.5M11 14.5V11h3.5M2.5 11H6v3.5" stroke="#cfe3d8" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
  <button id="mute" class="stage-btn" title="Toggle sound" aria-label="Toggle sound"><svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 6h3l4-3.5v11L5 10H2z" fill="#cfe3d8"/><path class="wav" d="M11 5q2 3 0 6M13 3.5q3 4.5 0 9" stroke="#cfe3d8" fill="none" stroke-width="1.3" stroke-linecap="round"/></svg></button>
  <div id="rotateHint">Landscape is more comfortable</div>
</div>
<script src="js/core.js"></script>
<script src="js/paint.js"></script>
<script src="js/scenes_a.js"></script>
<script src="js/scenes_b.js"></script>
<script src="js/meta.js"></script>
<script src="js/star.js"></script>
<script src="js/main.js"></script>
</body>
</html>
